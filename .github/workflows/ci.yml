name: CI

on:
  push:
  pull_request:

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile script
        run: python -m py_compile NA_text_converter_finder.py app_resources.py

      - name: Check version output
        run: python NA_text_converter_finder.py --version

      - name: Check standalone script without icon resources
        run: |
          standalone_dir="$(mktemp -d)"
          cp NA_text_converter_finder.py "$standalone_dir/"
          cd "$standalone_dir"
          python NA_text_converter_finder.py --version
          QT_QPA_PLATFORM=offscreen python -c "from PyQt5.QtWidgets import QApplication; import NA_text_converter_finder as m; app = QApplication([]); gui = m.NAToolsGUI(); assert not m.APP_RESOURCES_AVAILABLE; assert gui.windowTitle().endswith('v6.2')"
